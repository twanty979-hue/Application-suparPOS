name: Pos_Foodscan
description: "Pos Foodscan Android Application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.8 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  image_cropper: ^8.0.0
  flutter_image_compress: ^2.3.0

  # --- UI & Icons ---
  cupertino_icons: ^1.0.8

  # --- Backend & API ---
  http: ^1.6.0
  flutter_dotenv: ^5.1.0

  # --- Offline Database (SQLite) ---
  sqflite: ^2.4.2+1
  path: ^1.9.1

  # --- Hardware & Utilities ---
  blue_thermal_printer: ^1.2.3
  esc_pos_printer: any
  esc_pos_utils: any
  permission_handler: ^11.0.0
  shared_preferences: ^2.5.4
  mobile_scanner: ^5.1.1
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  image: ^3.3.0
  promptpay_qrcode_generate: ^1.0.2
  uuid: ^4.5.3
  image_picker: ^1.2.2
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: any
  flutter_tts: any
  audioplayers: any
  file_picker: any
  path_provider: any
  flutter_svg: ^2.3.0
  flutter_secure_storage: ^10.3.1
  confetti: ^0.8.0
  purchases_flutter: ^10.2.3
  google_sign_in: ^7.2.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - lib/assets/
    - lib/assets/loading/

  fonts:
    - family: Sarabun
      fonts:
        - asset: lib/assets/fonts/Sarabun-Regular.ttf
          weight: 400
        - asset: lib/assets/fonts/Sarabun-Medium.ttf
          weight: 500
        - asset: lib/assets/fonts/Sarabun-SemiBold.ttf
          weight: 600
        - asset: lib/assets/fonts/Sarabun-Bold.ttf
          weight: 700
        - asset: lib/assets/fonts/Sarabun-ExtraBold.ttf
          weight: 800

flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "lib/assets/app_logo.png"
  adaptive_icon_background: "#70C56B"
  adaptive_icon_foreground: "lib/assets/app_logo.png"
